version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: adris-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: adris
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Mineria99*}
      POSTGRES_DB: adriskids
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adris -d adriskids"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adris-network

  redis:
    image: redis:7-alpine
    container_name: adris-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adris-network

  db-init:
    image: postgres:15-alpine
    container_name: adris-db-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD:-Mineria99*}
    volumes:
      - ./scripts/init-db.sh:/init-db.sh
      - ./packages/prisma:/app/packages/prisma
      - ./packages/prisma-wms:/app/packages/prisma-wms
    entrypoint: /bin/sh
    command: /init-db.sh
    networks:
      - adris-network

  wms:
    build:
      context: .
      dockerfile: wms/Dockerfile
    container_name: adris-wms
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://adris:${DB_PASSWORD:-Mineria99*}@postgres:5432/adriskids
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=${WMS_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-adriskids-wms-secret-2024}
      - MERCADOPAGO_ACCESS_TOKEN=${MERCADOPAGO_ACCESS_TOKEN:-}
      - MERCADOPAGO_PUBLIC_KEY=${MERCADOPAGO_PUBLIC_KEY:-}
      - IMGBB_API_KEY=${IMGBB_API_KEY:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - FROM_EMAIL=${FROM_EMAIL:-noreply@adriskids.com}
      - NUBEFACT_TOKEN=${NUBEFACT_TOKEN:-}
      - NUBEFACT_URL=${NUBEFACT_URL:-https://demo.nubefact.com/api/v1}
      - SUNAT_RUC=${SUNAT_RUC:-}
      - SUNAT_USER=${SUNAT_USER:-}
      - SUNAT_PASSWORD=${SUNAT_PASSWORD:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - adris-network

  tienda:
    build:
      context: .
      dockerfile: tienda/Dockerfile
    container_name: adris-tienda
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://adris:${DB_PASSWORD:-Mineria99*}@postgres:5432/adriskids
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=${TIENDA_URL:-http://localhost:3001}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-adriskids-wms-secret-2024}
      - MERCADOPAGO_ACCESS_TOKEN=${MERCADOPAGO_ACCESS_TOKEN:-}
      - MERCADOPAGO_PUBLIC_KEY=${MERCADOPAGO_PUBLIC_KEY:-}
      - IMGBB_API_KEY=${IMGBB_API_KEY:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - FROM_EMAIL=${FROM_EMAIL:-noreply@adriskids.com}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - adris-network

  nginx:
    image: nginx:alpine
    container_name: adris-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - wms
      - tienda
    networks:
      - adris-network

networks:
  adris-network:
    driver: bridge

volumes:
  postgres_data:
